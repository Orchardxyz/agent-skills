<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode __PROBLEM_NUMBER__ — __TITLE__ · __SOLUTION_KEYWORD__</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #020617;
      --bg-glow-a: rgba(245, 158, 11, 0.14);
      --bg-glow-b: rgba(59, 130, 246, 0.12);
      --panel: rgba(15, 23, 42, 0.82);
      --panel-strong: rgba(15, 23, 42, 0.92);
      --border: rgba(100, 116, 139, 0.3);
      --text-main: #e2e8f0;
      --text-soft: #94a3b8;
      --text-faint: #64748b;
      --code-text: #cbd5e1;
      --code-number: #475569;
      --code-highlight-bg: rgba(250, 204, 21, 0.16);
      --code-highlight-border: #facc15;
      --code-highlight-text: #fef08a;
      --button-bg: rgba(51, 65, 85, 0.96);
      --button-hover: rgba(71, 85, 105, 0.96);
      --button-text: #cbd5e1;
      --button-active-bg: rgba(180, 83, 9, 0.9);
      --button-active-text: #fef3c7;
    }

    body.theme-dark {
      color-scheme: dark;
    }

    body.theme-light {
      color-scheme: light;
      --bg: #f8fafc;
      --bg-glow-a: rgba(245, 158, 11, 0.08);
      --bg-glow-b: rgba(59, 130, 246, 0.06);
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --border: rgba(148, 163, 184, 0.28);
      --text-main: #0f172a;
      --text-soft: #475569;
      --text-faint: #94a3b8;
      --code-text: #334155;
      --code-number: #94a3b8;
      --code-highlight-bg: rgba(245, 158, 11, 0.12);
      --code-highlight-border: #d97706;
      --code-highlight-text: #92400e;
      --button-bg: rgba(226, 232, 240, 0.98);
      --button-hover: rgba(203, 213, 225, 0.98);
      --button-text: #334155;
      --button-active-bg: rgba(245, 158, 11, 0.16);
      --button-active-text: #92400e;
    }

    body {
      background:
        radial-gradient(circle at top left, var(--bg-glow-a), transparent 28%),
        radial-gradient(circle at top right, var(--bg-glow-b), transparent 24%),
        var(--bg);
      color: var(--text-main);
    }

    .panel {
      background: var(--panel);
      border-color: var(--border);
      color: var(--text-main);
      backdrop-filter: blur(14px);
    }

    .panel-strong { background: var(--panel-strong); }
    .text-main { color: var(--text-main); }
    .text-soft { color: var(--text-soft); }
    .text-faint { color: var(--text-faint); }
    .control-btn, .speed-btn, .theme-btn { background: var(--button-bg); color: var(--button-text); }
    .speed-btn.active, .code-mode-btn.active { background: var(--button-active-bg); color: var(--button-active-text); }
    .code-line { color: var(--code-text); border-left: 3px solid transparent; }
    .code-line-number { color: var(--code-number); }
  </style>
</head>
<body class="theme-light min-h-screen font-sans selection:bg-amber-500/30">
  <div class="max-w-7xl mx-auto px-4 py-5 md:py-8">
    <div class="mb-5">
      <div class="flex items-start justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-3 flex-wrap">
          <h1 class="text-2xl md:text-3xl font-bold text-main">__TITLE__ <span class="text-base font-normal text-faint">__TITLE_EN__</span></h1>
          <span class="px-2 py-0.5 text-xs font-mono rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">__COMPLEXITY__</span>
        </div>
        <button id="themeToggle" class="theme-btn inline-flex items-center gap-2 rounded-xl border px-3 py-2 text-sm border-slate-500/20">__THEME_TOGGLE__</button>
      </div>
      <p class="text-soft mt-1.5 text-sm md:text-base">__SUMMARY__</p>
    </div>

    <div class="panel rounded-xl p-4 mb-6 border">
      <h2 class="text-sm font-semibold text-amber-500 uppercase tracking-wide mb-2">核心思路</h2>
      <p class="text-faint text-xs md:text-sm mt-2 leading-relaxed">__CORE_IDEA__</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-5 mb-5 min-h-[60vh]">
      <div class="lg:col-span-3 panel rounded-xl border p-4 md:p-5 overflow-auto min-h-0">
        __VISUALIZATION_PANEL__
      </div>

      <div class="lg:col-span-2 min-h-0">
        <div class="panel panel-strong rounded-xl border overflow-hidden h-full flex flex-col">
          <div class="px-4 py-2.5 border-b border-slate-500/20 flex items-center justify-between">
            <div>
              <span class="text-xs font-semibold text-soft uppercase tracking-wide">__CODE_LANGUAGE__</span>
              <span class="text-[10px] text-faint block">__CODE_SUBTITLE__</span>
            </div>
            <div class="flex items-center gap-2 text-xs">
              <button id="modeReal" class="code-mode-btn speed-btn active px-2 py-1 rounded transition">真实代码</button>
              <button id="modePseudo" class="code-mode-btn speed-btn px-2 py-1 rounded transition">伪代码</button>
            </div>
          </div>
          <div id="realCodePanel" class="py-2 font-mono text-xs md:text-sm leading-relaxed overflow-auto min-h-0"></div>
          <div id="pseudoCodePanel" class="py-2 font-mono text-xs md:text-sm leading-relaxed overflow-auto min-h-0 hidden"></div>
        </div>
      </div>
    </div>

    <div class="panel rounded-xl border p-3 md:p-4 flex flex-wrap items-center justify-center gap-3">
      __CONTROL_BAR__
    </div>
  </div>

  <script>
    __FRAME_DATA__
    __PAGE_RENDER_LOGIC__
  </script>
</body>
</html>
